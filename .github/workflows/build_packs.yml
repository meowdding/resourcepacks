name: Build and Upload Packs

on:
  push:
    branches: [ "*" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run Script
        run: |
          chmod +x .github/scripts/buildpack.main.kts 
          .github/scripts/buildpack.main.kts

      # Taken from https://gist.github.com/LJBNZ/35a59ea05d8d3854b8c31f0495727aed
      - name: Setup artifacts
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: |
          npm install @actions/artifact@2.3.2 --global
          echo "NODE_PATH=$(npm root --quiet -g)" >> $GITHUB_ENV

      - uses: actions/github-script@v7
        env:
          github-token: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            core.exportVariable('ACTIONS_RESULTS_URL', process.env['ACTIONS_RESULTS_URL'])
            core.exportVariable('ACTIONS_RUNTIME_URL', process.env['ACTIONS_RUNTIME_URL'])
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN'])

      - name: "Upload folders as artifacts"
        run: |
          const fs = require('fs');
          const path = require('path');
          const { DefaultArtifactClient } = require('@actions/artifact');

          const artifactClient = new DefaultArtifactClient();  // Initialise the Artifact client

          async function uploadDirAsArtifact(artifactName, rootDir) {
            // Fetches all files in rootDir recursively, uploads them as an artifact with the given name
            const files = fs.readdirSync(rootDir, { recursive: true, withFileTypes: true })
              .filter(dirEnt => dirEnt.isFile())
              .map(dirEnt => path.join(dirEnt.path, dirEnt.name));

            if (files.length == 0) {
              return;
            }
            console.log(`Uploading ${files.length} files from ${rootDir} as artifact ${artifactName}...`);
            const {id, size} = await artifactClient.uploadArtifact(artifactName, files, rootDir);
            console.log(`Uploaded artifact ${id} with size ${size} bytes`);
          }

          async function main() {
            const buildOutputDir = "dest";

            // Upload each folder in directory as individual artifact
            const buildOutputFolders = fs.readdirSync(buildOutputDir, { withFileTypes: true })
              .filter(dirEnt => dirEnt.isDirectory())
              .map(dirEnt => dirEnt.name);
            for (const folderName of buildOutputFolders) {
              uploadDirAsArtifact(folderName, path.join(individualResultsDir, folderName));
            }
          }

          main().catch(error => {
            console.error(`Failed to upload artifacts: ${error}`);
            process.exit(1);
          });
        shell: node {0}